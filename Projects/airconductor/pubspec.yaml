name: airconductor
description: Hands-free music player with gesture and voice control
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & ML
  camera: ^0.10.5+9
  google_mlkit_pose_detection: ^0.10.0
  google_mlkit_commons: ^0.6.1

  # Voice
  speech_to_text: ^6.6.1

  # Audio
  just_audio: ^0.9.36
  audio_session: ^0.1.18

  # State & Utils
  provider: ^6.1.1
  args: ^2.4.2
  permission_handler: ^11.1.0
  path_provider: ^2.1.2

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/